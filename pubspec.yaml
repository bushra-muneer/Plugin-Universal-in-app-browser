name: plugin_universal_in_app_browser
description: A lightweight Flutter plugin for opening web content through a simple universal in-app browser API.
version: 0.1.1
homepage: https://github.com/bushra-muneer/Plugin-Universal-in-app-browser
repository: https://github.com/bushra-muneer/Plugin-Universal-in-app-browser
issue_tracker: https://github.com/bushra-muneer/Plugin-Universal-in-app-browser/issues
documentation: https://github.com/bushra-muneer/Plugin-Universal-in-app-browser#readme
topics:
  - browser
  - webview
  - custom-tabs
  - safari-view-controller
  - in-app-browser

environment:
  sdk: ">=2.19.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.bushra.plugin_universal_in_app_browser
        pluginClass: PluginUniversalInAppBrowserPlugin
      ios:
        pluginClass: PluginUniversalInAppBrowserPlugin
